<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">AI Complaint Admin Dashboard</h2>

    <div class="text-end mb-3">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <table class="table table-bordered table-striped">
        <tr class="table-dark">
            <th>ID</th>
            <th>Name</th>
            <th>Complaint</th>
            <th>Category</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for c in complaints %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}</td>
            <td>
                {% if c[4] == 'Resolved' %}
                    <span class="badge bg-success">Resolved</span>
                {% else %}
                    <span class="badge bg-warning text-dark">Pending</span>
                {% endif %}
            </td>
            <td>
                <a href="/delete/{{ c[0] }}" class="btn btn-sm btn-danger">Delete</a>
                <a href="/resolve/{{ c[0] }}" class="btn btn-sm btn-success">Resolve</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
